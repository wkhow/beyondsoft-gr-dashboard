, "typ_zh": "补助", "descriptor": "ESG flagship project-cost grant (no cap).", "descriptor_zh": "企发局旗舰项目成本补助（无上限）。", "criteria": "SG-registered; ≥30% local equity; financially viable.", "criteria_zh": "在新加坡注册；本地股权≥30%；财务可行。", "benefits": "Up to 50% (some 70%) of project costs, no cap — Core Capabilities, Innovation & Productivity, Market Access.", "benefits_zh": "项目成本最高50%（部分70%）资助、无上限——核心能力、创新与生产力、市场准入。", "direct": "Low / Unlikely", "direct_zh": "低／不太可能", "clientRating": "High", "clientRating_zh": "高", "why": "Gated by >=30% local equity, so blocked for Beyondsoft directly. Major client channel: local clients fund digital/AI transformation projects (50–70%, no cap) with Beyondsoft as the appointed vendor. (Note: EDG/PSG/MRA consolidate into the unified EDGE grant in 2H2026.)", "why_zh": "因≥30%本地股权门槛，博彦无法直接申请。重要客户渠道：本地客户资助数码／人工智能转型项目（50–70%、无上限），由博彦担任受委交付供应商。重要营收杠杆。（注：EDG／PSG／MRA将于2026年下半年整合为统一的EDGE补助。）", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Enterprise Singapore (EnterpriseSG)", "agency_zh": "新加坡企业发展局", "scheme": "Market Readiness Assistance (MRA)", "scheme_zh": "市场准备援助计划（MRA）", "abbr": "MRA", "typ": "Grant", "typ_zh": "补助", "descriptor": "ESG overseas-expansion cost grant.", "descriptor_zh": "企发局海外拓展成本补助。", "criteria": "SME; SG-registered; ≥30% local equity; <S$100m turnover.", "criteria_zh": "中小企业；在新加坡注册；本地股权≥30%；营业额<1亿新元。", "benefits": "Up to 50% (70% for SMEs from 1 Apr 2026) of overseas-expansion costs; cap S$100k per new market.", "benefits_zh": "海外拓展成本最高50%（2026年4月1日起中小企业70%）资助；每个新市场上限10万新元。", "direct": "Low / Unlikely", "direct_zh": "低／不太可能", "clientRating": "Medium", "clientRating_zh": "中", "why": "Not for Beyondsoft (SME/local-equity bar; also expands into SG, not out). Moderate client channel: clients expanding overseas can appoint Beyondsoft as the IT/market set-up provider. (Note: EDG/PSG/MRA consolidate into the unified EDGE grant in 2H2026.)", "why_zh": "博彦不适用（中小企／本地股权门槛；且博彦是进入而非走出新加坡）。客户渠道适中：海外拓展的客户可委任博彦为IT／市场设立供应商。（注：EDG／PSG／MRA将于2026年下半年整合为统一的EDGE补助。）", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Enterprise Singapore (EnterpriseSG)", "agency_zh": "新加坡企业发展局", "scheme": "Productivity Solutions Grant (PSG)", "scheme_zh": "生产力解决方案津贴（PSG）", "abbr": "PSG (ESG)", "typ": "Grant", "typ_zh": "补助", "descriptor": "Subsidy for pre-approved productivity/IT solutions.", "descriptor_zh": "预批生产力／IT方案津贴。", "criteria": "SG-registered; ≥30% local shareholding; SME size limits.", "criteria_zh": "在新加坡注册；本地股权≥30%；中小企业规模限制。", "benefits": "Up to 50%, cap S$30k, for pre-approved productivity/IT solutions.", "benefits_zh": "最高50%，上限3万新元，用于预批生产力／IT方案。", "direct": "Low / Unlikely", "direct_zh": "低／不太可能", "clientRating": "High", "clientRating_zh": "高", "why": "Same as IMDA PSG — blocked for Beyondsoft, strong via clients. List Beyondsoft solutions as a PSG vendor so SME clients buy them at up to 50%. (Note: EDG/PSG/MRA consolidate into the unified EDGE grant in 2H2026.)", "why_zh": "与资媒局PSG相同——博彦无法直接申请，经客户渠道强劲。将博彦方案列为PSG供应商，使中小企业客户以最高50%采购。（注：EDG／PSG／MRA将于2026年下半年整合为统一的EDGE补助。）", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Enterprise Singapore (EnterpriseSG)", "agency_zh": "新加坡企业发展局", "scheme": "Startup SG (Founder / Tech / Accelerator)", "scheme_zh": "新创企业计划（Startup SG）", "abbr": "Startup SG", "typ": "Grant", "typ_zh": "补助", "descriptor": "Early-stage startup grants & matched funding.", "descriptor_zh": "早期初创企业补助与配对资金。", "criteria": "SG-based startups / first-time founders; local-ownership and novelty conditions.", "criteria_zh": "在新加坡的初创企业／首次创业者；本地股权与新颖性条件。", "benefits": "Grants/matched funding for early-stage startups and first-time founders (e.g. Tech PoC S$250k, PoV S$500k).", "benefits_zh": "为早期初创及首次创业者提供补助／配对资金（如技术概念验证25万、价值验证50万新元）。", "direct": "Low / Unlikely", "direct_zh": "低／不太可能", "clientRating": "Low", "clientRating_zh": "低", "why": "Beyondsoft is an established MNC, not a startup — out of scope as an applicant. Only a niche client play (startup clients engaging Beyondsoft as a build partner).", "why_zh": "博彦是成熟跨国企业而非初创，作为申请人不适用。仅小众客户渠道（初创客户委托博彦作为构建伙伴）。", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Infocomm Media Development Authority (IMDA)", "agency_zh": "资讯通信媒体发展局", "scheme": "TechSkills Accelerator (TeSA)", "scheme_zh": "科技技能加速器（TeSA）", "abbr": "TeSA", "typ": "Grant", "typ_zh": "补助", "descriptor": "ICT/AI/data talent training, placement & company-led training.", "descriptor_zh": "ICT／AI／数据人才培训、就业与企业主导培训。", "criteria": "Companies hiring/training ICT/AI talent in SG; partner IMDA/SSG/WSG.", "criteria_zh": "在新加坡聘用／培训ICT／AI人才的企业；与资媒局／精深技能局／劳动力局合作。", "benefits": "Co-funds structured training and salaries to build ICT/AI professionals (company-led & mid-career tracks).", "benefits_zh": "共同资助结构化培训与薪金以培养ICT／AI专才（企业主导及中途转业通道）。", "direct": "High", "direct_zh": "高", "clientRating": "Low", "clientRating_zh": "低", "why": "Strong Beyondsoft-as-applicant tool to build the local AI/delivery workforce; key pipeline for the AI Practice team. Restored from earlier version.  [Jointly administered by IMDA, SSG, WSG]", "why_zh": "博彦作为申请人组建本地AI／交付团队的有力工具；为AI业务团队输送人才的关键渠道。（自早期版本恢复）  ［由资媒局、精深技能局、劳动力局联合管理］", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Inland Revenue Authority of Singapore (IRAS)", "agency_zh": "国内税务局", "scheme": "Enterprise Innovation Scheme (EIS) — 400% incl. AI", "scheme_zh": "企业创新计划（EIS）——400%含AI", "abbr": "EIS", "typ": "Tax incentive", "typ_zh": "税务优惠", "descriptor": "400% tax deduction on innovation, now including AI.", "descriptor_zh": "创新活动400%税务扣除，现纳入AI。", "criteria": "SG taxpayers; qualifying innovation activities; AI expenditure qualifies for YA2027–2028, cap S$50k/YA (AI category).", "criteria_zh": "新加坡纳税企业；合格创新活动；AI开支于2027–2028课税年合格，AI类上限5万新元／年。", "benefits": "400% deduction (vs normal 100%) on qualifying spend incl. AI tools/training; cap S$50k/YA for AI (YA2027–28).", "benefits_zh": "对合格开支（含AI工具／培训）给予400%扣除（普通为100%）；AI类上限5万新元／年（2027–28）。", "direct": "Medium", "direct_zh": "中", "clientRating": "Medium", "clientRating_zh": "中", "why": "Dual: Beyondsoft claims 400% on its own AI adoption; clients get 400% deduction on AI tools/training bought from Beyondsoft — a concrete sales lever.  [Policy under MOF; administered by IRAS]", "why_zh": "双重：博彦对自身AI采用享400%扣除；客户购买博彦AI工具／培训亦可享400%扣除——是明确的销售卖点。  ［政策归属财政部，由国内税务局管理］", "matrix": true}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "Ministry of Manpower (MOM)", "agency_zh": "人力部", "scheme": "Work-pass framework (EP/COMPASS) + Tech@SG endorsement", "scheme_zh": "就业准证框架（EP／COMPASS）＋Tech@SG背书", "abbr": "EP/COMPASS", "typ": "Enabler", "typ_zh": "支持机制", "descriptor": "Work-pass framework for foreign professionals.", "descriptor_zh": "外籍专业人士工作准证框架。", "criteria": "Meet EP salary/qualification and COMPASS criteria; Tech@SG via EDB/ESG.", "criteria_zh": "符合就业准证薪金／资历及COMPASS标准；Tech@SG经经发局／企发局。", "benefits": "Not a grant — the pass system enabling deployment of foreign professionals; COMPASS points framework; Tech@SG fast-tracking.", "benefits_zh": "并非补助——这是部署外籍专业人士的准证体系；COMPASS计分框架；Tech@SG快速通道。", "direct": "Enabling", "direct_zh": "支持机制", "clientRating": "n/a", "clientRating_zh": "不适用", "why": "Not a grant — the enabler for deploying overseas talent into Beyondsoft's SG entity; manage proactively with Tech@SG. No client-as-applicant dimension.", "why_zh": "并非补助——是将海外人才调入博彦新加坡实体的支持机制；宜与Tech@SG主动管理。无客户作为申请人的维度。", "matrix": false}, {"cat": "C", "category": "C — Enterprise & Industry", "category_zh": "C — 产业与企业（含人才）", "agency": "SkillsFuture Singapore (SSG)", "agency_zh": "精深技能发展局", "scheme": "SkillsFuture course funding + Enhanced Training Support / Absentee Payroll", "scheme_zh": "技能创前程课程津贴＋加强培训支持／缺勤薪金", "ab function bBucket(e){const d=e.direct;if(d==='Low / Unlikely'||d==='Context')return null;if(d==='High')return'high';if(d==='Medium')return'med';return'other';}

/* unique-by-abbr for matrix */
function matrixData(){const seen={},out=[];DATA.forEach(e=>{if(e.matrix===false)return;if(seen[e.abbr])return;seen[e.abbr]=1;out.push(e);});return out;}

function renderMatrix(){
  const md=matrixData(); const m2=document.getElementById('m2');
  function chip(e,col){const cls=col==='b'?bColor[e.direct]:cColor[e.clientRating];
    return `<span class="chip ${cls||'gN'}" onclick='openScheme(${JSON.stringify(e.abbr)})'>${esc(e.abbr)}${e.typ&&e.typ.indexOf('Certification')>=0?'<span style="font-size:9px;vertical-align:super">◆</span>':''}</span>`;}
  function fill(col,key){const fn=col==='b'?bBucket:cBucket;const items=md.filter(e=>fn(e)===key);
    if(!items.length)return '<div class="cell empty">—</div>';
    const hot=(col==='c'&&key==='high');
    return `<div class="cell${hot?' hot':''}">${items.map(e=>chip(e,col)).join('')}</div>`;}
  const rows=[['high',t(L.rHigh),''],['med',t(L.rMed),''],['other',t(L.rOther),t(L.rOtherSub)]];
  let g=`<div></div><div class="colhdr">${t(L.colB)}</div><div class="colhdr">${t(L.colC)}</div>`;
  rows.forEach(([k,lab,sub])=>{g+=`<div class="rowlab">${lab}${sub?`<small>${sub}</small>`:''}</div>`+fill('b',k)+fill('c',k);});
  m2.innerHTML=g;
  document.getElementById('mLegend').innerHTML=
   `<span><i class="dot gG"></i>${t(L.legHigh)}</span><span><i class="dot gY"></i>${t(L.legMed)}</span>`+
   `<span><i class="dot gO"></i>${t(L.legCond)}</span><span><i class="dot gB"></i>${t(L.legStr)}</span>`;
}

  let rs=DATA.filter(e=>(!cat||e.cat===cat)&&(!ag||e.agency===ag)&&(!ty||e.typ===ty)&&
    (!q||(e.scheme+e.scheme_zh+e.agency+e.agency_zh+e.descriptor+e.descriptor_zh+e.why+e.why_zh).toLowerCase().includes(q)));
  const tb=document.getElementById('tbody');
  tb.innerHTML=rs.map((e,i)=>`
   <tr class="row" onclick="tog(${i})">
    <td><span class="catbadge ${catBadge[e.cat]}">${e.cat}</span>${esc(fld(e,'agency'))}</td>
    <td><b>${esc(fld(e,'scheme'))}</b><div class="sub">${esc(fld(e,'descriptor'))}</div></td>
    <td>${esc(fld(e,'typ'))}</td>
    <td><span class="badge ${bBadge[e.direct]||'bN'}">${esc(fld(e,'direct'))}</span></td>
    <td><span class="badge ${cBadge[e.clientRating]||'bN'}">${esc(fld(e,'clientRating'))}</span></td>
    <td>${esc(fld(e,'why'))}</td></tr>
   <tr class="detail" id="d${i}"><td colspan="6">
    <div class="block"><div class="lab">${t(L.dDesc)}</div>${esc(fld(e,'descriptor'))}</div>
    <div class="block"><div class="lab">${t(L.dCrit)}</div>${esc(fld(e,'criteria'))}</div>
    <div class="block"><div class="lab">${t(L.dBen)}</div>${esc(fld(e,'benefits'))}</div>
    <div class="block"><div class="lab">${t(L.dWhy)}</div>${esc(fld(e,'why'))}</div>
   </td></tr>`).join('');
  document.getElementById('count').textContent=rs.length+' / '+DATA.length+' '+t(L.count);
}
function tog(i){const e=document.getElementById('d'+i);e.style.display=e.style.display==='table-row'?'none':'table-row';}

function buildFilters(){
  const fCat=document.getElementById('fCat'),fAg=document.getElementById('fAgency'),fTy=document.getElementById('fType');
  const cv=fCat.value,av=fAg.value,tv=fTy.value;
  const cats=[...new Set(DATA.map(e=>e.cat))].sort();
  const ags=[...new Set(DATA.map(e=>e.agency))].sort();
  const tys=[...new Set(DATA.map(e=>e.typ))].sort();
  const catLabel={}; DATA.forEach(e=>catLabel[e.cat]=lang==='en'?e.category:e.category_zh);
  const agLabel={}; DATA.forEach(e=>agLabel[e.agency]=lang==='en'?e.agency:e.agency_zh);
  const tyLabel={}; DATA.forEach(e=>tyLabel[e.typ]=lang==='en'?e.typ:e.typ_zh);
  fCat.innerHTML=`<option value="">${t(L.allCat)}</option>`+cats.map(c=>`<option value="${c}">${esc(catLabel[c])}</option>`).join('');
  fAg.innerHTML=`<option value="">${t(L.allAgency)}</option>`+ags.map(a=>`<option value="${esc(a)}">${esc(agLabel[a])}</option>`).join('');
  fTy.innerHTML=`<option value="">${t(L.allType)}</option>`+tys.map(x=>`<option value="${esc(x)}">${esc(tyLabel[x])}</option>`).join('');
  fCat.value=cv;fAg.value=av;fTy.value=tv;
}
function applyLang(){
  document.getElementById('h1').textContent=t(L.h1);
  document.getElementById('sub').textContent=t(L.sub);
  document.getElementById('tabM').textContent=t(L.tabM);
  document.getElementById('tabT').textContent=t(L.tabT);
  document.getElementById('mIntro').innerHTML=t(L.mIntro);
  document.getElementById('mCallout').innerHTML=t(L.callout);
  document.getElementById('fSearch').placeholder=t(L.search);
  document.getElementById('foot').textContent=t(L.foot);
  document.getElementById('thead').innerHTML=
    `<th style="width:15%">${t(L.thAgency)}</th><th style="width:24%">${t(L.thScheme)}</th>`+
    `<th style="width:9%">${t(L.thType)}</th><th style="width:11%">${t(L.thB)}</th>`+
    `<th style="width:10%">${t(L.thC)}</th><th>${t(L.thWhy)}</th>`;
  document.getElementById('tLegend').innerHTML=
    `<span><i class="sw bG"></i>${t(L.legHigh)}</span><span><i class="sw bY"></i>${t(L.legMed)}/${t(L.legCond)}</span>`+
    `<span><i class="sw bR"></i>Low</span><span><i class="sw bB"></i>${t(L.legStr)}</span><span><i class="sw bN"></i>${t(L.legNa)}</span>`;
  document.getElementById('lgEN').className=lang==='en'?'on':'off';
  document.getElementById('lgZH').className=lang==='zh'?'on':'off';
  document.documentElement.lang=lang==='en'?'en':'zh';
  buildFilters(); renderMatrix(); renderTable();
}
document.getElementById('langtog').onclick=()=>{lang=(lang==='en'?'zh':'en');applyLang();};
['fCat','fAgency','fType'].forEach(id=>document.getElementById(id).onchange=renderTable);
document.getElementById('fSearch').oninput=renderTable;
function openScheme(ab){
  document.querySelector('.tab[data-v="table"]').click();
  document.getElementById('fCat').value='';document.getElementById('fAgency').value='';document.getElementById('fType').value='';
  const e=DATA.find(x=>x.abbr===ab); document.getElementById('fSearch').value=e?fld(e,'scheme').split(' (')[0]:ab; renderTable();
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');document.getElementById(b.dataset.v).classList.add('active');});
applyLang();
</script></body></html>
